<!DOCTYPE html>
<html>
<head>
  <title>Quiz Automation</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin-top: 0;
      color: #333;
      font-size: 18px;
      text-align: center;
    }
    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 10px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #3367d6;
    }
    .btn-danger {
      background-color: #dc3545;
    }
    .btn-danger:hover {
      background-color: #c82333;
    }
    .status {
      margin-top: 5px;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
    .progress-info {
      background-color: #e9ecef;
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    .divider {
      height: 1px;
      background-color: #ddd;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Quiz Automation</h2>
    <input type="password" id="apiKey" placeholder="Enter your Gemini API Key">
    <button id="saveKey">Save API Key</button>
    
    <div class="divider"></div>
    
    <button id="startAutomation">Start Automation</button>
    <div id="status" class="status"></div>
    
    <div class="progress-info">
      Question <span id="current-question">-</span> of <span id="total-questions">-</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
